<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal & Stem - Flower Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/logo.png" alt="Petal & Stem Logo" class="custom-logo">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pages</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-4">
                    <a href="#" class="text-dark"><i class="fas fa-search"></i></a>
                    <a href="#" class="text-dark"><i class="far fa-user"></i></a>
                    <a href="#" class="text-dark position-relative">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-section position-relative d-flex align-items-center">
        <div class="hero-bg-image" style="background-image: url('images/hero-flower.png');"></div>
        
        <div class="container position-relative z-1">
            <div class="row">
                <div class="col-md-6 col-lg-5">
                    <p class="text-uppercase small fw-bold mb-2 hero-subtitle">Exclusive Collection</p>
                    <h1 class="display-3 fw-bold mb-3 hero-title">HAPPY MOTHER'S DAY!</h1>
                    <p class="mb-4 text-muted fs-5">Bring joy to your mom with fresh flowers.</p>
                    <a href="#" class="btn rounded-pill px-4 py-2 fw-bold btn-primary-custom">Shop Collection</a>
                </div>
            
    </section>
    <section class="features-section py-4 bg-white border-bottom">
        <div class="container">
            <div class="row g-4">
                
                <div class="col-6 col-md-3 d-flex align-items-center justify-content-center justify-content-md-start">
                    <div class="feature-icon bg-orange">
                        <i class="fas fa-truck"></i>
                    </div>
                    <div class="ms-3 text-start">
                        <h6 class="mb-0 fw-bold">Free Shipping</h6>
                        <small class="text-muted">For orders over $50</small>
                    </div>
                </div>

                <div class="col-6 col-md-3 d-flex align-items-center justify-content-center justify-content-md-start">
                    <div class="feature-icon bg-teal">
                        <i class="fas fa-undo"></i>
                    </div>
                    <div class="ms-3 text-start">
                        <h6 class="mb-0 fw-bold">Return Policy</h6>
                        <small class="text-muted">7 days return</small>
                    </div>
                </div>

                <div class="col-6 col-md-3 d-flex align-items-center justify-content-center justify-content-md-start">
                    <div class="feature-icon bg-purple">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div class="ms-3 text-start">
                        <h6 class="mb-0 fw-bold">Support 24/7</h6>
                        <small class="text-muted">Always here for you</small>
                    </div>
                </div>

                <div class="col-6 col-md-3 d-flex align-items-center justify-content-center justify-content-md-start">
                    <div class="feature-icon bg-green">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="ms-3 text-start">
                        <h6 class="mb-0 fw-bold">Secure Payment</h6>
                        <small class="text-muted">100% secure checkout</small>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
