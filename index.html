<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petal & Stem - Flower Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="images/logo.png" alt="Petal & Stem Logo" class="custom-logo">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Pages</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
                
                <div class="d-flex align-items-center gap-4">
                    <a href="#" class="text-dark"><i class="fas fa-search"></i></a>
                    <a href="#" class="text-dark"><i class="far fa-user"></i></a>
                    <a href="#" class="text-dark position-relative">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero-section position-relative">
        <div class="container">
            <div class="row align-items-center hero-row">
                
                <div class="col-md-6 z-1">
                    <p class="text-uppercase small fw-bold mb-1 hero-subtitle">Exclusive Collection</p>
                    <h1 class="display-3 fw-bold mb-3">HAPPY MOTHER'S DAY!</h1>
                    <p class="mb-4 text-muted fs-5">Bring joy to your mom with fresh flowers.</p>
                    <a href="#" class="btn rounded-pill px-4 py-2 fw-bold btn-primary-custom">Shop Collection</a>
                </div>
                
                <div class="col-md-6 position-relative p-0">
                    <img src="images/hero-flower.png" alt="Mother's Day Flowers" class="hero-image">
                </div>
            </div>

            <button class="position-absolute top-50 start-0 translate-middle-y btn text-dark ms-2"><i class="fas fa-chevron-left fs-3"></i></button>
            <button class="position-absolute top-50 end-0 translate-middle-y btn text-dark me-2"><i class="fas fa-chevron-right fs-3"></i></button>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
